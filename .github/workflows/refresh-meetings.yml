name: Refresh meeting data

on:
  schedule:
    - cron: "23 7 * * *" # nightly at 1:23am CT (2:23am CDT)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-meetings
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch meeting schedules
        run: npm run fetch

      - name: Commit updated data
        run: |
          git config user.name "meeting-refresh[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: nightly meeting schedule refresh"
            git push
          fi
